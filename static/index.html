<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666666;
    --accent: #c8ff00;
    --accent2: #00d4ff;
    --danger: #ff4444;
    --warning: #ffaa00;
    --success: #00cc66;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* AUTH */
  .auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .auth-box {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
  }

  .auth-logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .auth-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 32px;
    color: var(--text);
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* FORMS */
  .form-group { margin-bottom: 16px; }
  
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 80px; }

  select option { background: var(--surface2); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
  }

  .btn-primary:hover { background: #b8ee00; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    padding: 6px 12px;
    font-size: 12px;
  }

  .btn-danger:hover { background: var(--danger); color: #fff; }

  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }

  .btn-accent {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .btn-accent:hover { background: #b8ee00; }

  .btn-blue {
    background: var(--accent2);
    color: #000;
    font-weight: 600;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .sidebar-logo-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .sidebar-logo-title {
    font-size: 16px;
    font-weight: 600;
    margin-top: 4px;
  }

  .nav-section {
    padding: 0 12px;
    margin-bottom: 8px;
  }

  .nav-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }

  .nav-item.active {
    background: var(--surface2);
    color: var(--accent);
  }

  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 16px 20px 0;
    border-top: 1px solid var(--border);
  }

  .user-info {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .user-info strong { color: var(--text); display: block; font-size: 13px; }

  .main {
    flex: 1;
    margin-left: 220px;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .page-title {
    font-size: 18px;
    font-weight: 600;
  }

  .content { padding: 32px; }

  /* CARDS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .stat-value.positive { color: var(--success); }
  .stat-value.negative { color: var(--danger); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.blue { color: var(--accent2); }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .card-body { padding: 20px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* PROGRESS */
  .progress-bar {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .progress-fill.done { background: var(--success); }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }

  .badge-active { background: rgba(0,212,255,0.1); color: var(--accent2); }
  .badge-completed { background: rgba(0,204,102,0.1); color: var(--success); }
  .badge-cleared { background: rgba(0,204,102,0.1); color: var(--success); }
  .badge-warning { background: rgba(255,170,0,0.1); color: var(--warning); }
  .badge-danger { background: rgba(255,68,68,0.1); color: var(--danger); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title { font-size: 16px; font-weight: 600; }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 4px;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 24px; }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }

  .modal-footer .btn { width: auto; }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    min-width: 260px;
    animation: slideIn 0.2s ease;
  }

  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }

  .empty-title { font-size: 15px; margin-bottom: 6px; color: var(--text); }

  /* ACTIONS */
  .actions { display: flex; gap: 6px; align-items: center; }

  /* RS FORMAT */
  .amount { font-family: 'DM Mono', monospace; }
  .amount-positive { color: var(--success); }
  .amount-negative { color: var(--danger); }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
  }

  /* GOAL CARD */
  .goal-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .goal-item:last-child { border-bottom: none; }

  .goal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .goal-name { font-weight: 500; font-size: 14px; }
  .goal-cat {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .goal-amounts {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .goal-pct {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* TX ROW */
  .tx-type {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  .tx-deposit { color: var(--success); }
  .tx-withdrawal { color: var(--danger); }
  .tx-saving { color: var(--accent); }
  .tx-expense { color: var(--warning); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .content { padding: 16px; }
  }

  .hidden { display: none !important; }

  .mono { font-family: 'DM Mono', monospace; }

  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .text-muted { color: var(--muted); }
  .text-sm { font-size: 12px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .w-full { width: 100%; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Finance Tracker</div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Dasun Theekshana">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="dasun">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="dasun@example.com">
      </div>
      <div class="form-group">
        <label>Monthly Salary (Rs)</label>
        <input type="number" id="regSalary" placeholder="76775">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div class="app hidden" id="appScreen">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-label">Finance</div>
      <div class="sidebar-logo-title">Tracker</div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <div class="nav-dot"></div> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('transactions')">
        <div class="nav-dot"></div> Transactions
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Money</div>
      <div class="nav-item" onclick="showPage('savings')">
        <div class="nav-dot"></div> Savings Accounts
      </div>
      <div class="nav-item" onclick="showPage('goals')">
        <div class="nav-dot"></div> Goals
      </div>
      <div class="nav-item" onclick="showPage('income')">
        <div class="nav-dot"></div> Income
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Outgoings</div>
      <div class="nav-item" onclick="showPage('expenses')">
        <div class="nav-dot"></div> Monthly Expenses
      </div>
      <div class="nav-item" onclick="showPage('installments')">
        <div class="nav-dot"></div> Installments
      </div>
      <div class="nav-item" onclick="showPage('debts')">
        <div class="nav-dot"></div> Debts
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="user-info">
        <strong id="sidebarName">-</strong>
        <span id="sidebarUsername">-</span>
      </div>
      <button class="btn btn-secondary btn-sm w-full" onclick="showPage('profile')">Profile</button>
      <br><br>
      <button class="btn btn-danger btn-sm w-full" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div id="topbarActions"></div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = '';
let token = localStorage.getItem('ft_token') || '';
let currentUser = null;
let currentPage = 'dashboard';

// ── API ─────────────────────────────────────────────────────────────────────
async function api(method, path, body = null, form = false) {
  const opts = {
    method,
    headers: {}
  };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) {
    if (form) {
      opts.body = new URLSearchParams(body);
      opts.headers['Content-Type'] = 'application/x-www-form-urlencoded';
    } else {
      opts.body = JSON.stringify(body);
      opts.headers['Content-Type'] = 'application/json';
    }
  }
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

// ── FORMAT ───────────────────────────────────────────────────────────────────
function rs(n) {
  if (n == null || n === '') return 'Rs 0';
  return 'Rs ' + Number(n).toLocaleString('en-LK', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function pct(a, b) {
  if (!b || b === 0) return 0;
  return Math.min(100, Math.round((a / b) * 100));
}

function dateStr(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b, i) => {
    b.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
}

async function login() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) return toast('Fill in all fields', 'error');
  try {
    const data = await api('POST', '/api/auth/login', { username, password }, true);
    token = data.access_token;
    localStorage.setItem('ft_token', token);
    await initApp();
  } catch (e) { toast(e.message, 'error'); }
}

async function register() {
  const full_name = document.getElementById('regName').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const monthly_salary = parseFloat(document.getElementById('regSalary').value) || 0;
  const password = document.getElementById('regPassword').value;
  if (!username || !email || !password) return toast('Fill in all required fields', 'error');
  try {
    await api('POST', '/api/auth/register', { full_name, username, email, password, monthly_salary });
    toast('Account created! Sign in now.');
    switchAuthTab('login');
    document.getElementById('loginUsername').value = username;
  } catch (e) { toast(e.message, 'error'); }
}

function logout() {
  token = '';
  localStorage.removeItem('ft_token');
  currentUser = null;
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('appScreen').classList.add('hidden');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initApp() {
  try {
    currentUser = await api('GET', '/api/auth/me');
    document.getElementById('sidebarName').textContent = currentUser.full_name || currentUser.username;
    document.getElementById('sidebarUsername').textContent = '@' + currentUser.username;
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    showPage('dashboard');
  } catch (e) {
    token = '';
    localStorage.removeItem('ft_token');
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().toLowerCase().replace(/\s+/g, '-') === page ||
      (page === 'dashboard' && el.textContent.includes('Dashboard')) ||
      (page === 'transactions' && el.textContent.includes('Transactions')) ||
      (page === 'savings' && el.textContent.includes('Savings')) ||
      (page === 'goals' && el.textContent.includes('Goals')) ||
      (page === 'income' && el.textContent.includes('Income')) ||
      (page === 'expenses' && el.textContent.includes('Expenses')) ||
      (page === 'installments' && el.textContent.includes('Installments')) ||
      (page === 'debts' && el.textContent.includes('Debts'))
    );
  });

  const titles = {
    dashboard: 'Dashboard', transactions: 'Transactions', savings: 'Savings Accounts',
    goals: 'Goals', income: 'Income Sources', expenses: 'Monthly Expenses',
    installments: 'Installments', debts: 'Debts', profile: 'Profile'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  document.getElementById('topbarActions').innerHTML = '';

  const pages = {
    dashboard: renderDashboard, transactions: renderTransactions,
    savings: renderSavings, goals: renderGoals, income: renderIncome,
    expenses: renderExpenses, installments: renderInstallments,
    debts: renderDebts, profile: renderProfile
  };

  if (pages[page]) pages[page]();
}

    <div class="form-group"><label>Amount (Rs)</label><input id="m_eamt" type="number" placeholder="3000" /></div>
    <div class="form-group"><label>Notes</label><textarea id="m_enotes" placeholder="Optional notes..."></textarea></div>
  `, async () => {
    await api('POST', '/api/expenses', { name: v('m_ename'), amount: parseFloat(v('m_eamt')), category: v('m_ecat'), due_day: parseInt(v('m_eday')) || null, notes: v('m_enotes') });
    toast('Expense added'); closeModal(); renderExpenses();
  });
}

async function toggleExpense(id, current) {
  await api('PUT', `/api/expenses/${id}`, { is_active: current ? 0 : 1 });
  toast(current ? 'Paused' : 'Resumed'); renderExpenses();
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  await api('DELETE', `/api/expenses/${id}`);
  toast('Deleted'); renderExpenses();
}

// ── INSTALLMENTS ──────────────────────────────────────────────────────────────
async function renderInstallments() {
  const el = document.getElementById('pageContent');
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn-accent btn-sm" onclick="openAddInstallment()">+ Add Installment</button>`;
  el.innerHTML = '<div class="text-muted">Loading...</div>';
  try {
    const items = await api('GET', '/api/installments');
    const active = items.filter(i => i.status === 'active');
    const monthly = active.reduce((s, i) => s + i.monthly_amount, 0);

    el.innerHTML = `
      <div class="stat-grid" style="margin-bottom:24px">
        <div class="stat-card"><div class="stat-label">Monthly Total</div><div class="stat-value negative">${rs(monthly)}</div></div>
        <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value">${active.length}</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value positive">${items.filter(i=>i.status==='completed').length}</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">All Installments</div></div>
        ${items.length === 0 ? '<div class="empty"><div class="empty-title">No installments</div></div>' :
          `<div class="table-wrap"><table>
            <thead><tr><th>Name</th><th>Provider</th><th>Progress</th><th>Monthly</th><th>Remaining</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${items.map(i => {
              const p = pct(i.paid_months, i.total_months);
              const remaining_months = i.total_months - i.paid_months;
              const remaining_amount = remaining_months * i.monthly_amount;
              return `<tr>
                <td><strong>${i.name}</strong>${i.notes ? `<div class="text-sm text-muted">${i.notes}</div>` : ''}</td>
                <td>${i.provider || '-'}</td>
                <td style="min-width:140px">
                  <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${i.paid_months}/${i.total_months} months</div>
                  <div class="progress-bar"><div class="progress-fill ${p>=100?'done':''}" style="width:${p}%"></div></div>
                </td>
                <td class="mono amount-negative">${rs(i.monthly_amount)}</td>
                <td class="mono">${rs(remaining_amount)}<div class="text-sm text-muted">${remaining_months} months</div></td>
                <td><span class="badge badge-${i.status}">${i.status}</span></td>
                <td>
                  <div class="actions">
                    ${i.status === 'active' ? `<button class="btn btn-accent btn-sm" onclick="payInstallment(${i.id})">Mark Paid</button>` : ''}
                    <button class="btn btn-danger btn-sm" onclick="deleteInstallment(${i.id})">Delete</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
            </tbody>
          </table></div>`}
      </div>`;
  } catch (e) { el.innerHTML = `<div class="text-muted">${e.message}</div>`; }
}

function openAddInstallment() {
  openModal('Add Installment', `
    <div class="form-group"><label>Name</label><input id="m_iinst_name" placeholder="Phone - Samsung S24" /></div>
    <div class="form-group"><label>Provider / Shop</label><input id="m_iinst_prov" placeholder="Koko / MintPay / PayZ" /></div>
    <div class="grid-2">
      <div class="form-group"><label>Total Amount (Rs)</label><input id="m_iinst_total" type="number" placeholder="192000" /></div>
      <div class="form-group"><label>Monthly Amount (Rs)</label><input id="m_iinst_monthly" type="number" placeholder="16000" /></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Total Months</label><input id="m_iinst_months" type="number" placeholder="12" /></div>
      <div class="form-group"><label>Paid Months So Far</label><input id="m_iinst_paid" type="number" placeholder="1" /></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Due Day</label><input id="m_iinst_day" type="number" min="1" max="31" placeholder="26" /></div>
      <div class="form-group"><label>Start Date</label><input id="m_iinst_start" type="date" /></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="m_iinst_notes" placeholder="Optional notes..."></textarea></div>
  `, async () => {
    await api('POST', '/api/installments', {
      name: v('m_iinst_name'), provider: v('m_iinst_prov'),
      total_amount: parseFloat(v('m_iinst_total')), monthly_amount: parseFloat(v('m_iinst_monthly')),
      total_months: parseInt(v('m_iinst_months')), paid_months: parseInt(v('m_iinst_paid')) || 0,
      due_day: parseInt(v('m_iinst_day')) || null, start_date: v('m_iinst_start') || null,
      notes: v('m_iinst_notes')
    });
    toast('Installment added'); closeModal(); renderInstallments();
  });
}

async function payInstallment(id) {
  await api('POST', `/api/installments/${id}/pay`);
  toast('Payment recorded'); renderInstallments();
}

async function deleteInstallment(id) {
  if (!confirm('Delete this installment?')) return;
  await api('DELETE', `/api/installments/${id}`);
  toast('Deleted'); renderInstallments();
}

// ── DEBTS ─────────────────────────────────────────────────────────────────────
async function renderDebts() {
  const el = document.getElementById('pageContent');
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn-accent btn-sm" onclick="openAddDebt()">+ Add Debt</button>`;
  el.innerHTML = '<div class="text-muted">Loading...</div>';
  try {
    const debts = await api('GET', '/api/debts');
    const active = debts.filter(d => d.status === 'active');
    const total_remaining = active.reduce((s, d) => s + d.remaining_amount, 0);
    const monthly = active.reduce((s, d) => s + d.monthly_payment, 0);

    el.innerHTML = `
      <div class="stat-grid" style="margin-bottom:24px">
        <div class="stat-card"><div class="stat-label">Total Remaining</div><div class="stat-value negative">${rs(total_remaining)}</div></div>
        <div class="stat-card"><div class="stat-label">Monthly Payments</div><div class="stat-value negative">${rs(monthly)}</div></div>
        <div class="stat-card"><div class="stat-label">Active Debts</div><div class="stat-value">${active.length}</div></div>
        <div class="stat-card"><div class="stat-label">Cleared</div><div class="stat-value positive">${debts.filter(d=>d.status==='cleared').length}</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">All Debts</div></div>
        ${debts.length === 0 ? '<div class="empty"><div class="empty-title">No debts - great!</div></div>' :
          `<div class="table-wrap"><table>
            <thead><tr><th>Name</th><th>Lender</th><th>Interest</th><th>Total</th><th>Remaining</th><th>Monthly</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${debts.map(d => {
              const p = pct(d.total_amount - d.remaining_amount, d.total_amount);
              return `<tr>
                <td><strong>${d.name}</strong>${d.notes ? `<div class="text-sm text-muted">${d.notes}</div>` : ''}</td>
                <td>${d.lender || '-'}</td>
                <td class="mono">${d.interest_rate}%</td>
                <td class="mono">${rs(d.total_amount)}</td>
                <td>
                  <span class="mono amount-negative">${rs(d.remaining_amount)}</span>
                  <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${p}%"></div></div>
                </td>
                <td class="mono">${rs(d.monthly_payment)}</td>
                <td><span class="badge badge-${d.status}">${d.status}</span></td>
                <td>
                  <div class="actions">
                    ${d.status === 'active' ? `<button class="btn btn-accent btn-sm" onclick="openPayDebt(${d.id},'${d.name}',${d.monthly_payment})">Pay</button>` : ''}
                    <button class="btn btn-danger btn-sm" onclick="deleteDebt(${d.id})">Delete</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
            </tbody>
          </table></div>`}
      </div>`;
  } catch (e) { el.innerHTML = `<div class="text-muted">${e.message}</div>`; }
}

function openAddDebt() {
  openModal('Add Debt', `
    <div class="form-group"><label>Name</label><input id="m_dbt_name" placeholder="HSBC Credit Card" /></div>
    <div class="form-group"><label>Lender</label><input id="m_dbt_lender" placeholder="HSBC Bank" /></div>
    <div class="grid-2">
      <div class="form-group"><label>Total Amount (Rs)</label><input id="m_dbt_total" type="number" placeholder="200000" /></div>
      <div class="form-group"><label>Remaining (Rs)</label><input id="m_dbt_remaining" type="number" placeholder="200000" /></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Monthly Payment (Rs)</label><input id="m_dbt_monthly" type="number" placeholder="17000" /></div>
      <div class="form-group"><label>Interest Rate (%)</label><input id="m_dbt_rate" type="number" step="0.1" placeholder="24" /></div>
    </div>
    <div class="form-group"><label>Due Day</label><input id="m_dbt_day" type="number" min="1" max="31" placeholder="25" /></div>
    <div class="form-group"><label>Notes</label><textarea id="m_dbt_notes" placeholder="Optional notes..."></textarea></div>
  `, async () => {
    await api('POST', '/api/debts', {
      name: v('m_dbt_name'), lender: v('m_dbt_lender'),
      total_amount: parseFloat(v('m_dbt_total')), remaining_amount: parseFloat(v('m_dbt_remaining')),
      monthly_payment: parseFloat(v('m_dbt_monthly')) || 0, interest_rate: parseFloat(v('m_dbt_rate')) || 0,
      due_day: parseInt(v('m_dbt_day')) || null, notes: v('m_dbt_notes')
    });
    toast('Debt added'); closeModal(); renderDebts();
  });
}

function openPayDebt(id, name, suggestion) {
  openModal(`Pay Debt: ${name}`, `
    <div class="form-group"><label>Amount (Rs)</label><input id="m_dpamt" type="number" value="${suggestion}" /></div>
    <div class="form-group"><label>Description</label><input id="m_dpdesc" placeholder="Monthly payment" /></div>
  `, async () => {
    await api('POST', `/api/debts/${id}/pay`, { amount: parseFloat(v('m_dpamt')), description: v('m_dpdesc') });
    toast('Payment recorded'); closeModal(); renderDebts();
  });
}

async function deleteDebt(id) {
  if (!confirm('Delete this debt?')) return;
  await api('DELETE', `/api/debts/${id}`);
  toast('Deleted'); renderDebts();
}

// ── TRANSACTIONS ──────────────────────────────────────────────────────────────
async function renderTransactions() {
  const el = document.getElementById('pageContent');
  el.innerHTML = '<div class="text-muted">Loading...</div>';
  try {
    const txs = await api('GET', '/api/transactions');
    el.innerHTML = `
      <div class="card">
        <div class="card-header"><div class="card-title">All Transactions (last 100)</div></div>
        ${txs.length === 0 ? '<div class="empty"><div class="empty-title">No transactions yet</div></div>' :
          `<div class="table-wrap"><table>
            <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead>
            <tbody>${txs.map(t => `
              <tr>
                <td class="text-muted text-sm mono">${dateStr(t.date)}</td>
                <td>${t.description || '-'}</td>
                <td>${t.category ? `<span class="badge badge-active">${t.category}</span>` : '-'}</td>
                <td><span class="tx-type tx-${t.type}">${t.type}</span></td>
                <td class="mono">${rs(t.amount)}</td>
              </tr>`).join('')}
            </tbody>
          </table></div>`}
      </div>`;
  } catch (e) { el.innerHTML = `<div class="text-muted">${e.message}</div>`; }
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
async function renderProfile() {
  const el = document.getElementById('pageContent');
  const u = currentUser;
  el.innerHTML = `
    <div class="card" style="max-width:500px">
      <div class="card-header"><div class="card-title">Profile</div></div>
      <div class="card-body">
        <div class="form-group"><label>Full Name</label><input id="p_name" value="${u.full_name || ''}" /></div>
        <div class="form-group"><label>Email</label><input id="p_email" value="${u.email || ''}" /></div>
        <div class="form-group"><label>Monthly Salary (Rs)</label><input id="p_salary" type="number" value="${u.monthly_salary || 0}" /></div>
        <div class="form-group"><label>Username</label><input value="${u.username}" disabled /></div>
        <div class="form-group"><label>Member Since</label><input value="${dateStr(u.created_at)}" disabled /></div>
        <button class="btn btn-accent w-full" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>`;
}

async function saveProfile() {
  try {
    await api('PUT', '/api/auth/me', {
      full_name: v('p_name'), email: v('p_email'),
      monthly_salary: parseFloat(v('p_salary')) || 0
    });
    currentUser = await api('GET', '/api/auth/me');
    document.getElementById('sidebarName').textContent = currentUser.full_name || currentUser.username;
    toast('Profile saved');
  } catch (e) { toast(e.message, 'error'); }
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
let modalCallback = null;

function openModal(title, body, onConfirm, confirmLabel = 'Save') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  modalCallback = onConfirm;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-accent" onclick="confirmModal()">${confirmLabel}</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

async function confirmModal() {
  if (!modalCallback) return;
  try {
    await modalCallback();
  } catch (e) { toast(e.message, 'error'); }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  modalCallback = null;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function v(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

if (token) {
  initApp();
}
</script>
