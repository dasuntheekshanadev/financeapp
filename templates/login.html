<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Manager - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: #2a2d35;
    --accent: #c8f04c;
    --accent2: #4cf0b4;
    --text: #f0f0f0;
    --muted: #6b7280;
    --red: #f87171;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 60%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(200,240,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 50%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(76,240,180,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .wrap {
    width: 100%;
    max-width: 400px;
    padding: 2rem;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 0.25rem;
  }
  .brand-sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }
  .card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: var(--text);
  }
  .field { margin-bottom: 1.1rem; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .error {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--red);
    font-size: 0.88rem;
    margin-bottom: 1rem;
  }
  .link-row {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .link-row a { color: var(--accent); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">FinanceOS</div>
  <div class="brand-sub">Personal finance command center</div>
  <div class="card">
    <h2>Sign in</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit">Sign in</button>
    </form>
    <div class="link-row">No account? <a href="/register">Create one</a></div>
  </div>
</div>
</body>
</html>
