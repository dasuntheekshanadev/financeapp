name: Deploy FinanceOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='finance.db' --exclude='venv/' --exclude='__pycache__/' --exclude='.git/' --exclude='*.pyc'
          path: ./
          remote_path: /var/www/financeapp/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/financeapp
            venv/bin/pip install -r requirements.txt --quiet
            sudo supervisorctl restart financeapp
            sudo supervisorctl status financeapp
            echo "--- Done ---"